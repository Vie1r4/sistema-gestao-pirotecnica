# Testes unitários e de integração do backend.

name: .NET tests

on:
  pull_request:
    paths:
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Domain/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "Finalproj.Tests/**"
      - "Finalproj.IntegrationTests/**"
      - "Finalproj.sln"
      - ".github/workflows/dotnet-tests.yml"
      - "scripts/check-coverage-threshold.py"
  push:
    branches: [main, next]
    paths:
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Domain/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "Finalproj.Tests/**"
      - "Finalproj.IntegrationTests/**"
      - "Finalproj.sln"
      - ".github/workflows/dotnet-tests.yml"
      - "scripts/check-coverage-threshold.py"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test (unit + integration, sem Docker)
        run: |
          dotnet test Finalproj.sln -c Release --filter "Category!=Docker" --collect:"XPlat Code Coverage" --results-directory ./TestResults

      - name: Verificar cobertura Domain/Application (≥ 60%)
        run: python3 scripts/check-coverage-threshold.py "TestResults/**/coverage.cobertura.xml"

      - name: Test FIFO concorrência (Docker / SQL Server)
        run: |
          dotnet test Finalproj.IntegrationTests/Finalproj.IntegrationTests.csproj -c Release --filter "Category=Docker"

      - name: Instalar ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Relatório HTML de cobertura
        if: always()
        run: |
          reportgenerator \
            -reports:"TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:Html

      - name: Upload cobertura
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

      - name: Verificar pacotes vulneráveis (bloqueia HIGH)
        run: |
          output=$(dotnet list package --vulnerable --include-transitive 2>&1 || true)
          echo "$output"
          if echo "$output" | grep -Eiq '\bhigh\b|\bcritical\b'; then
            echo "::error::Pacotes com vulnerabilidade HIGH ou CRITICAL encontrados."
            exit 1
          fi
