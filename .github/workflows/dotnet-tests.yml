# Testes unitários e de integração do backend.

name: .NET tests

on:
  pull_request:
    paths:
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Domain/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "Finalproj.Tests/**"
      - "Finalproj.IntegrationTests/**"
      - "Finalproj.sln"
      - ".github/workflows/dotnet-tests.yml"
  push:
    branches: [main, next]
    paths:
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Domain/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "Finalproj.Tests/**"
      - "Finalproj.IntegrationTests/**"
      - "Finalproj.sln"
      - ".github/workflows/dotnet-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test (unit + integration)
        run: |
          dotnet test Finalproj.sln -c Release --collect:"XPlat Code Coverage"

      - name: Verificar pacotes vulneráveis
        run: dotnet list package --vulnerable --include-transitive
        continue-on-error: true
