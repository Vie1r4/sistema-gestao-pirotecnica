# Frontend Next.js: typecheck + ESLint + Vitest em paralelo; build; Playwright E2E (Chromium).
name: Client

on:
  pull_request:
    paths:
      - "apps/web/**"
      - ".github/workflows/client-ci.yml"
  push:
    branches: [main, next]
    paths:
      - "apps/web/**"
      - ".github/workflows/client-ci.yml"

jobs:
  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Auditoria de segurança npm
        run: npm audit --audit-level=high

      # Typecheck, lint e testes unitários em paralelo; qualquer falha falha o job.
      - name: Typecheck, lint and unit tests
        shell: bash
        run: |
          npm run typecheck & pid_tc=$!
          npm run lint & pid_lint=$!
          npm run test & pid_test=$!
          ec=0
          wait "$pid_tc" || ec=1
          wait "$pid_lint" || ec=1
          wait "$pid_test" || ec=1
          exit "$ec"

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install Playwright (Chromium + deps)
        run: npx playwright install chromium --with-deps

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e
