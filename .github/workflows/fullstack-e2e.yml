# E2E full-stack: Playwright → Next.js → API (HTTPS) → SQL Server.

name: Full-stack E2E

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "src/Finalproj.Domain/**"
      - "scripts/e2e-fullstack/**"
      - ".github/workflows/fullstack-e2e.yml"
  push:
    branches: [main, next]
    paths:
      - "apps/web/**"
      - "src/Finalproj.Api/**"
      - "src/Finalproj.Application/**"
      - "src/Finalproj.Infrastructure/**"
      - "src/Finalproj.Domain/**"
      - "scripts/e2e-fullstack/**"
      - ".github/workflows/fullstack-e2e.yml"

env:
  MSSQL_SA_PASSWORD: E2eTest_sa_Passw0rd
  E2E_FULLSTACK: "1"
  E2E_USE_HTTPS: "1"
  E2E_API_URL: https://127.0.0.1:7225
  E2E_BASE_URL: http://127.0.0.1:3000
  NEXT_PUBLIC_API_URL: https://127.0.0.1:7225
  E2E_ADMIN_EMAIL: e2e-fullstack@pirofafe.pt
  E2E_ADMIN_PASSWORD: Teste123!Aa
  E2E_ADMIN_NOME: Admin E2E Fullstack
  ConnectionStrings__FinalprojContext: "Server=localhost,1433;Database=FinalprojE2E;User Id=sa;Password=E2eTest_sa_Passw0rd;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=true"
  E2E_SQL_HOST: localhost
  Jwt__Secret: e2e-fullstack-jwt-secret-minimum-32-characters
  Bootstrap__AllowFirstUserRegistration: "true"
  Cors__AllowedOrigins: http://127.0.0.1:3000

jobs:
  fullstack-e2e:
    runs-on: ubuntu-latest
    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: E2eTest_sa_Passw0rd
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P E2eTest_sa_Passw0rd -C -Q 'SELECT 1' || /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P E2eTest_sa_Passw0rd -C -Q 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 40s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Certificado HTTPS de desenvolvimento
        run: |
          # Gerar cert para Kestrel; --trust falha no runner Ubuntu (exit 4).
          # Clientes E2E (curl -k, Playwright ignoreHTTPSErrors) não precisam de trust OS.
          dotnet dev-certs https --clean
          dotnet dev-certs https

      - name: Restore e build API
        run: dotnet restore Finalproj.sln && dotnet build src/Finalproj.Api/Finalproj.Api.csproj -c Release --no-restore

      - name: Start API (HTTPS, background)
        run: |
          chmod +x scripts/e2e-fullstack/*.sh
          bash scripts/e2e-fullstack/wait-for-tcp.sh localhost 1433 60 2
          bash scripts/e2e-fullstack/start-api.sh
          bash scripts/e2e-fullstack/wait-for-http.sh "$E2E_API_URL/api/auth/existem-utilizadores" 90 3

      - name: Seed admin E2E
        run: bash scripts/e2e-fullstack/seed-admin.sh

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

      - name: Verificar API URL no build Next.js
        working-directory: apps/web
        run: |
          if ! grep -rq "127.0.0.1:7225" .next; then
            echo "::error::NEXT_PUBLIC_API_URL não ficou embutida no build (.next)."
            exit 1
          fi
          echo "OK: build referencia https://127.0.0.1:7225"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-fullstack-${{ runner.os }}-${{ hashFiles('apps/web/package-lock.json') }}

      - name: Install Playwright (Chromium + deps)
        working-directory: apps/web
        run: npx playwright install chromium --with-deps

      - name: Full-stack E2E (Playwright)
        working-directory: apps/web
        run: npm run test:e2e:fullstack

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-fullstack-report
          path: apps/web/playwright-report-fullstack/
          if-no-files-found: ignore

      - name: API log on failure
        if: failure()
        run: cat .e2e-api.log || true

      - name: Stop API
        if: always()
        run: bash scripts/e2e-fullstack/stop-api.sh
